<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8"> <!-- Agar bisa membaca emoji dan panah back -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>KlikBantu - Keamanan</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
        <script type="module" src="/src/main.js"></script>
        <style>
            body { font-family: 'Poppins', sans-serif; }
            input:focus { outline: none; border-color: #00aa13; }
        </style>
    </head>
    <body class="bg-[#f8f9fa] text-[#333]">
        <!-- Header -->
        <header class="max-w-[500px] mx-auto bg-white px-5 py-4 flex items-center sticky top-0 z-10 shadow-sm">
            <a href="akun.html" class="text-[1.2rem] mr-4 text-gray-600">←</a>
            <h1 class="text-[1.1rem] font-bold">Keamanan & Password</h1>
        </header>

        <!-- Main -->
        <main class="max-w-[500px] mx-auto px-5 pt-6 pb-10">
            <div class="bg-white rounded-[24px] p-5 mb-6 shadow-sm border border-green-50">
                <div class="flex items-center mb-3">
                    <div class="w-10 h-10 bg-[#f0fff0] rounded-full flex items-center justify-center mr-3">
                        <span class="text-[1.2rem]">🛡️</span>
                    </div>
                    <div>
                        <p class="text-[0.9rem] font-bold">Status password</p>
                    </div>
                </div>
                <p class="text-[0.75rem] text-gray-400">Password terakhir diganti 3 bulan yang lalu.</p>
            </div>

            <h2 class="text-[1rem] font-bold text-gray-400 mb-4 px-2 uppercase tracking-widest text-[0.7rem]">Ganti Password</h2>
            <div class="bg-white rounded-[24px] p-5 shadow-sm space-y-5 mb-8">
                <div>
                    <label class="text-[0.8rem] font-semibold text-gray-500 mb-1 block">Password Saat Ini</label>
                    <input type="password" placeholder="••••••••" class="w-full bg-[#f8f9fa] border border-gray-100 rounded-[16px] px-4 py-3 text-[0.9rem]">
                </div>

                <div>
                    <label class="text-[0.8rem] font-semibold text-gray-500 mb-1 block">Password Baru</label>
                    <input type="password" placeholder="Minimal 8 karakter" class="w-full bg-[#f8f9fa] border border-gray-100 rounded-[16px] px-4 py-3 text-[0.9rem]">
                </div>

                <div>
                    <label class="text-[0.8rem] font-semibold text-gray-500 mb-1 block">Ulangi Password Baru</label>
                    <input type="password" placeholder="Konfirmasi password baru" class="w-full bg-[#f8f9fa] border border-gray-100 rounded-[16px] px-4 py-3 text-[0.9rem]">
                </div>

                <button class="cursor-pointer w-full bg-[#00aa13] text-white font-bold py-3 rounded-[16px] mt-2 transition-transform active:scale-95">
                    Update Password
                </button>
            </div>

            <h2 class="text-[1rem] font-bold text-gray-400 mb-4 px-2 uppercase tracking-widest text-[0.7rem]">Keamanan Tambahan</h2>
            <div class="bg-white rounded-[24px] overflow-hidden shadow-sm">
                <div class="flex items-center justify-between p-5 border-b border-gray-50">
                    <div class="flex-1">
                        <p class="text-[0.9rem] font-semibold">Autentikasi 2 Faktor (2FA)</p>
                        <p class="text-[0.7rem] text-gray-400">Amankan akun dengan kode Email</p>
                    </div>
                    <div class="w-12 h-6 bg-gray-200 rounded-full relative cursor-pointer">
                        <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full"></div>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
