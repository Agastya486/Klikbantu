<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>KlikBantu - Riwayat Donasi</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Poppins', sans-serif; }
    </style>
  </head>

  <body class="bg-[#f5f5f5] text-[#333] leading-relaxed">

    <div class="max-w-[800px] mx-auto my-10 px-5">
      <!-- Header -->
      <header class="text-center mb-8">
        <h1 class="text-[#006600] text-4xl font-bold mb-2">Riwayat Kebaikan Kamu</h1>
        <p class="text-[#555] text-lg">Mari salurkan zakat atau donasi dengan mudah dan aman.</p>
      </header>

      <div class="overflow-hidden rounded-xl shadow-sm">
        <table class="w-full border-collapse bg-white">
          <thead>
            <tr class="bg-[#f0f9f0] text-[#006600] font-semibold text-left">
              <th class="p-4 border-b border-[#eee]">Nama</th>
              <th class="p-4 border-b border-[#eee]">Jumlah</th>
              <th class="p-4 border-b border-[#eee]">Metode</th>
              <th class="p-4 border-b border-[#eee]">Tanggal</th>
            </tr>
          </thead>
          <tbody id="donasi-list" class="divide-y divide-[#eee]">
            </tbody>
        </table>
      </div>

      <!-- Jika belum ada donasi -->
      <p id="empty-msg" class="hidden text-center text-[#888] mt-6">
        Belum ada data donasi. <a href="donatur.html" class="text-[#00aa13] hover:underline">Donasi sekarang →</a>
      </p>
    </div>

    <!-- Bottom nav -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[500px] bg-white flex justify-around py-3 border-t border-gray-100 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
      <a href="index.html" class="flex-1 text-center text-gray-400 text-[0.7rem]">
          <span class="text-[1.4rem] block mb-0.5">🏠</span>Beranda
      </a>
      <a href="donasi.html" class="flex-1 text-center text-[0.7rem] text-gray-400 hover:text-[#00aa13] transition-colors">
          <span class="text-[1.4rem] block mb-0.5">💰</span>Donasi
      </a>
      <a href="#" class="flex-1 text-center text-[0.7rem] text-[#00aa13] hover:text-[#00aa13] transition-colors font-bold">
          <span class="text-[1.4rem] block mb-0.5">📜</span>Riwayat
      </a>
      <a href="akun.html" class="flex-1 text-center text-[0.7rem] text-gray-400 hover:text-[#00aa13] transition-colors">
          <span class="text-[1.4rem] block mb-0.5">👤</span>Akun
      </a>
    </nav>

    <script src="riwayat.js"></script>
  </body>
</html>
